<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Enhanced</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 头部 -->
    <header class="header">
      <h1 class="header-title">🧠 DeepSeek Enhanced</h1>
      <button id="settingsBtn" class="header-btn" title="设置">⚙️</button>
    </header>

    <!-- 导航 Tab -->
    <nav class="tabs">
      <button class="tab active" data-tab="memories">🧠 记忆</button>
      <button class="tab" data-tab="skills">🎯 Skill</button>
      <button class="tab" data-tab="knowledge">📚 知识库</button>
    </nav>

    <!-- 页面容器 -->
    <main id="pageContainer" class="page-container">
      <!-- 动态加载页面内容 -->
    </main>

    <!-- 设置面板（默认隐藏） -->
    <div id="settingsPanel" class="settings-panel" style="display:none;"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
