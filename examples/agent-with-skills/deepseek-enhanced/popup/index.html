<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Enhanced 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 360px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      color: #333;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #f0f0f0;
    }
    .header-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }
    .header h1 {
      font-size: 18px;
      color: #1a1a2e;
    }
    .header p {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
    }
    .form-group textarea {
      width: 100%;
      height: 150px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.6;
    }
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .form-group textarea::placeholder {
      color: #bbb;
    }
    .form-row {
      display: flex;
      gap: 10px;
    }
    .form-row .form-group {
      flex: 1;
    }
    .form-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    .btn-primary:active {
      transform: translateY(0);
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #666;
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background: #e8e8e8;
    }
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status.show {
      opacity: 1;
    }
    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
    }
    .status.error {
      background: #ffebee;
      color: #c62828;
    }
    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 6px;
    }
    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">D</div>
      <div>
        <h1>DeepSeek Enhanced</h1>
        <p>自定义系统提示词</p>
      </div>
    </div>

    <div class="form-group">
      <label for="system-prompt">系统提示词</label>
      <textarea id="system-prompt" placeholder="输入您的自定义系统提示词...&#10;&#10;例如：&#10;你是一位专业的代码助手，擅长分析和优化代码。请使用清晰简洁的中文回答。"></textarea>
      <div class="hint">此提示词将在每次对话时自动注入到请求中</div>
    </div>

    <div class="form-group">
      <div class="checkbox-label">
        <input type="checkbox" id="enabled">
        <span>启用提示词注入</span>
      </div>
    </div>

    <button class="btn btn-primary" id="save-btn">保存设置</button>
    <button class="btn btn-secondary" id="reset-btn">恢复默认</button>

    <div class="divider"></div>

    <div class="hint" style="text-align: center; font-size: 10px;">
      刷新 chat.deepseek.com 后生效
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
